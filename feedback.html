<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
<title>TalentSwap Feedback</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f3f0e8;
    margin:0;
    padding:40px;
}

.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1 {
    color:#6c8f7b;
}

.rating {
    font-size:18px;
    font-weight:600;
    margin:10px 0;
}

.review {
    margin:20px 0;
    padding:15px;
    border-left:4px solid #6c8f7b;
    background:#f8f8f8;
    border-radius:10px;
}

.back {
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#6c8f7b;
    color:white;
    text-decoration:none;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

    <h1>⭐ User Feedback</h1>

    <p class="rating">4.8 / 5 Average Rating</p>

    <div class="review">
        <b>Sara K.</b><br>
        ⭐⭐⭐⭐⭐<br>
        “This app is so good, I learned so fast!”
    </div>

    <div class="review">
        <b>Ali M.</b><br>
        ⭐⭐⭐⭐⭐<br>
        “Best idea ever, I love the concept!”
    </div>

    <div class="review">
        <b>Lina R.</b><br>
        ⭐⭐⭐⭐☆<br>
        “Really helpful and fun to use.”
    </div>

    <a class="back" href="javascript:history.back()">← Go Back</a>
</div>

</body>
</html>
